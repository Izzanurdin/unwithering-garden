<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden of Unwithering Flowers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-transition"></div>

    <section id="landing-section">
        <div class="content-wrapper">
            <h1>GARDEN OF UNWITHERING FLOWERS</h1>
            <p>Real flowers may wither, but your bloom is eternal. You deserve unwithering flowers, and unwithering love.</p>
            <button id="accessBtn" class="btn">ENTER THE GARDEN</button>
        </div>
    </section>

    <section id="garden-section" style="display: none;">
        <div id="garden" class="garden"></div>
        
        <div class="controls">
            <button id="backBtn" class="btn" data-target="landing-section">← GO BACK</button>
            <button id="resetBtn" class="btn">RESET GARDEN</button>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
